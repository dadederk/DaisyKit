name: DaisyKit Test Matrix

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  macos-spm-tests:
    name: macos-spm-tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Swift Package tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          swift test --enable-code-coverage 2>&1 | tee artifacts/macos-swift-test.log
          COVERAGE_JSON_PATH="$(swift test --show-code-coverage-path)"
          if [[ -f "$COVERAGE_JSON_PATH" ]]; then
            cp "$COVERAGE_JSON_PATH" artifacts/DaisyKit.json
          else
            echo "{}" > artifacts/DaisyKit.json
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-spm-artifacts
          path: artifacts

  ios-simulator-package-tests:
    name: ios-simulator-package-tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run DaisyKit package tests on iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # Discover a compatible Swift package scheme across Xcode versions.
          SCHEME=""
          for CANDIDATE in DaisyKit-Package DaisyKit; do
            if xcodebuild -showBuildSettings -scheme "${CANDIDATE}" > "artifacts/${CANDIDATE}-build-settings.log" 2>&1; then
              SCHEME="${CANDIDATE}"
              break
            fi
          done

          if [[ -z "${SCHEME}" ]]; then
            echo "Failed to resolve DaisyKit scheme using xcodebuild -showBuildSettings." >&2
            exit 1
          fi

          echo "Using iOS test scheme: ${SCHEME}"

          # Resolve a concrete simulator destination.
          SIM_ID="$(
            xcrun simctl list devices available | \
              sed -nE 's/^[[:space:]]*iPhone[^()]* \(([0-9A-F-]+)\).*/\1/p' | \
              head -n1
          )"

          if [[ -z "${SIM_ID}" ]]; then
            echo "No available iPhone simulator found; attempting to create one."
            RUNTIME_ID="$(
              xcrun simctl list runtimes | \
                grep -E 'com\.apple\.CoreSimulator\.SimRuntime\.iOS' | \
                grep -v unavailable | \
                sed -nE 's/.* - (com\.apple\.CoreSimulator\.SimRuntime\.iOS[^ ]*).*/\1/p' | \
                head -n1
            )"
            DEVICE_TYPE_ID="$(
              xcrun simctl list devicetypes | \
                sed -nE 's/.*\((com\.apple\.CoreSimulator\.SimDeviceType\.iPhone[^)]+)\).*/\1/p' | \
                head -n1
            )"

            if [[ -n "${RUNTIME_ID}" && -n "${DEVICE_TYPE_ID}" ]]; then
              SIM_ID="$(xcrun simctl create "DaisyKit-CI-iPhone" "${DEVICE_TYPE_ID}" "${RUNTIME_ID}")"
            fi
          fi

          if [[ -z "${SIM_ID}" ]]; then
            echo "Unable to resolve or create an iOS simulator device." >&2
            xcrun simctl list devices || true
            xcrun simctl list runtimes || true
            exit 1
          fi

          echo "Using iOS simulator id: ${SIM_ID}"

          xcodebuild test \
            -scheme "${SCHEME}" \
            -destination "id=${SIM_ID}" \
            -enableCodeCoverage YES \
            -resultBundlePath "artifacts/${SCHEME}.xcresult" \
            2>&1 | tee artifacts/ios-package-tests.log

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-package-artifacts
          path: artifacts
